<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    :root { color-scheme: light; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      max-width: 760px;
      margin: 2rem auto;
      padding: 0 1.25rem 4rem;
      line-height: 1.55;
      color: #222;
      background: #fff;
    }
    h1 { font-size: 1.9rem; margin-top: 0; }
    h2 { font-size: 1.35rem; margin-top: 2rem; border-bottom: 1px solid #eee; padding-bottom: .35rem; }
    h3 { font-size: 1.1rem; margin-top: 1.5rem; }
    a { color: #1a5fb4; }
    hr { border: 0; border-top: 1px solid #eee; margin: 2rem 0; }
    code { background: #f4f4f4; padding: .1em .35em; border-radius: 3px; font-size: 92%; }
    nav.legal-nav {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #eee;
    }
    nav.legal-nav a { margin-right: 1rem; }
  </style>
</head>
<body>
  <nav class="legal-nav">
    <a href="{{ '/' | relative_url }}">SpeedSync Legal</a>
    <a href="{{ '/PRIVACY/' | relative_url }}">Privacy</a>
    <a href="{{ '/TERMS/' | relative_url }}">Terms</a>
  </nav>
  {{ content }}
</body>
</html>
